<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artemis II Mission Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="bg-black text-white">
    <div id="app" class="position-relative vw-100 vh-100 overflow-hidden">
        <!-- Canvas Map -->
        <canvas id="missionMap" class="position-absolute top-0 start-0 w-100 h-100"></canvas>

        <!-- HUD Overlay -->
        <div class="container-fluid position-absolute top-0 start-0 p-4 pe-none">
            <div class="row pe-auto">
                <div class="col-md-4">
                    <div class="glass-card mb-3 p-3 animate-slide-in">
                        <h1 class="h4 mb-0 font-orbitron text-cyan">ARTEMIS II</h1>
                        <div class="small opacity-75">ORION MISSION TRACKER</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side Stats -->
        <div class="position-absolute top-0 end-0 p-4 pe-none w-auto" style="min-width: 300px;">
            <div class="glass-card p-3 pe-auto animate-slide-in-right">
                <div class="mb-3">
                    <label class="small text-uppercase font-orbitron opacity-50">Mission Time</label>
                    <div id="missionClock" class="h3 font-orbitron text-glow">T+ 00:00:00</div>
                </div>
                <hr class="opacity-20">
                <div class="row g-2">
                    <div class="col-6 border-end border-white border-opacity-10">
                        <label class="small text-uppercase opacity-50">Velocity</label>
                        <div id="statVelocity" class="h5 mb-0" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Calculating..." style="cursor: help;">--- km/h</div>
                    </div>
                    <div class="col-6 ps-3">
                        <label class="small text-uppercase opacity-50">Altitude</label>
                        <div id="statAltitude" class="h5 mb-0">--- km</div>
                    </div>
                </div>
                <hr class="opacity-20">
                <div class="mb-0">
                    <label class="small text-uppercase opacity-50 text-moon">Distance to Moon</label>
                    <div id="statMoonDist" class="h5 mb-0">--- km</div>
                </div>
            </div>
        </div>

        <!-- Bottom Controls/Info -->
        <div class="position-absolute bottom-0 start-50 translate-middle-x p-4 text-center w-100 pe-none mobile-status-box">
            <div class="pe-auto d-inline-block shadow-lg">
                <div class="glass-card-sm px-4 py-2 small font-orbitron border-cyan-glow">
                    STATUS: <span id="missionStatus" class="text-success blink">NOMINAL</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
